# ╭──────────────────────────────────────────────────────────────╮
# │ 1. PHÍM & HÀNH VI CƠ BẢN                                     │
# ╰──────────────────────────────────────────────────────────────╯

# Đổi phím Prefix từ Ctrl+b sang Ctrl+a (giống Primeagen hay dùng)
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Chia màn hình bằng | và -
# -c giữ nguyên thư mục hiện tại khi tách khung; mặc định tmux mở khung mới ở
# thư mục lúc tạo session nên hay bị nhảy về ~.
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Làm mới cấu hình tmux bằng 'r'
unbind r
bind r source-file ~/.tmux.conf \; display-message " 󰑐 tmux config reloaded"

# Đánh số window/pane từ 1 cho dễ bấm
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Giảm delay khi chuyển mode hoặc dùng phím Esc trong Neovim
set -sg escape-time 10

# Báo cho ứng dụng bên trong biết khi khung được focus. Neovim dùng tín hiệu này
# để tự đọc lại file bị đổi bên ngoài và để đổi hình con trỏ đúng lúc.
set -g focus-events on

# Di chuyển giữa các khung (panes) bằng phím nvim (h,j,k,l)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Đổi kích thước khung bằng H,J,K,L (giữ prefix rồi bấm liên tục nhờ -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Cho phép dùng chuột
set -g mouse on

# Lịch sử cuộn dài hơn: mặc định 2000 dòng, log build/test dài là mất đầu.
set -g history-limit 50000

# Vi mode trong copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Clipboard: file này dùng chung cho máy Mac lẫn máy Linux, mà hai bên copy bằng
# lệnh khác nhau (pbcopy vs xclip). if-shell chạy lúc nạp config nên mỗi máy chỉ
# bind đúng lệnh nó có; hardcode một bên sẽ làm bên kia copy ra rỗng.
if-shell 'command -v pbcopy > /dev/null' {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -sel clip"
}

# ╭──────────────────────────────────────────────────────────────╮
# │ 2. TERMINAL: MÀU, GẠCH CHÂN, CON TRỎ                         │
# ╰──────────────────────────────────────────────────────────────╯

# Hỗ trợ hiển thị màu sắc 256 và icon chuẩn
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -ga terminal-overrides ",*:Tc"

# Cho phép undercurl (gạch lượn sóng) và undercurl CÓ MÀU bên trong tmux.
# Không có hai dòng này thì lỗi LSP trong Neovim tụt xuống thành gạch chân
# thẳng một màu, mất hết phân biệt error (đỏ) / warning (vàng) / hint (xanh).
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}/%d::%p1%{256}/%{256}%m::%p1%{256}%m%d%;m'

# Cho phép ứng dụng đổi hình con trỏ (Ss/Se). Nhờ đó Neovim vẫn hiện con trỏ
# thanh mảnh ở insert mode và khối đặc ở normal mode khi chạy trong tmux.
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Đặt tiêu đề cửa sổ terminal theo session/window đang mở.
set -g set-titles on
set -g set-titles-string "#S  󰁔  #W"

# ╭──────────────────────────────────────────────────────────────╮
# │ 3. PLUGIN + CẤU HÌNH CATPPUCCIN (phải đặt TRƯỚC khi nạp TPM) │
# ╰──────────────────────────────────────────────────────────────╯

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator' # Di chuyển mượt giữa nvim và tmux
set -g @plugin 'catppuccin/tmux#v2.3.0' # Giao diện màu sắc

set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato, mocha

# ── Bơm bảng màu Rosé Pine vào bộ máy Catppuccin ───────────────
# Catppuccin đặt cả 26 biến màu bằng `set -ogq` = CHỈ ghi khi biến còn rỗng.
# Đó là cái bẫy đã gặp ba lần trong file này. Ở đây nó thành ra có ích: gán sẵn
# giá trị Rosé Pine trước khi nạp TPM, thì file flavor chạy qua thấy biến nào
# cũng đã có nên bỏ qua hết — toàn bộ bộ máy dựng thanh của Catppuccin (module,
# viên thuốc, cờ, separator) vẫn chạy nguyên vẹn nhưng vẽ bằng màu Rosé Pine.
# Nhờ vậy không phải thay plugin, không mất một dòng tinh chỉnh nào.
#
# Hệ quả: dòng @catppuccin_flavor phía trên thành vô hiệu, mọi flavor đều cho
# ra cùng kết quả. Muốn quay về Catppuccin thật thì đổi 26 dòng dưới từ
# `set -g @thm_x "..."` thành `set -ug @thm_x` (xoá biến, để plugin tự ghi).
#
# Rosé Pine main. Ba biến nền của Catppuccin được ánh xạ lại chứ không bê thẳng:
# surface_0 lấy `overlay` (#26233a) chứ không lấy `surface` (#1f1d2e), vì viên
# thuốc nền dùng surface_0 mà nền terminal đang là #1e1e2e — hai màu đó gần như
# trùng nhau, viên thuốc sẽ chìm mất. #26233a nhô lên đủ để nhìn thấy.
set -g @thm_bg          "#191724" # base
set -g @thm_mantle      "#1f1d2e" # surface
set -g @thm_crust       "#191724" # base
set -g @thm_surface_0   "#26233a" # overlay
set -g @thm_surface_1   "#403d52" # highlight med
set -g @thm_surface_2   "#524f67" # highlight high
set -g @thm_overlay_0   "#6e6a86" # muted
set -g @thm_overlay_1   "#908caa" # subtle
set -g @thm_overlay_2   "#908caa" # subtle
set -g @thm_subtext_0   "#908caa" # subtle
set -g @thm_subtext_1   "#e0def4" # text
set -g @thm_fg          "#e0def4" # text
set -g @thm_rosewater   "#ebbcba" # rose
set -g @thm_flamingo    "#ebbcba" # rose
set -g @thm_pink        "#eb6f92" # love
set -g @thm_mauve       "#c4a7e7" # iris
set -g @thm_red         "#eb6f92" # love
set -g @thm_maroon      "#eb6f92" # love
set -g @thm_peach       "#f6c177" # gold
set -g @thm_yellow      "#f6c177" # gold
set -g @thm_green       "#31748f" # pine
set -g @thm_teal        "#9ccfd8" # foam
set -g @thm_sky         "#9ccfd8" # foam
set -g @thm_sapphire    "#31748f" # pine
set -g @thm_blue        "#31748f" # pine
set -g @thm_lavender    "#c4a7e7" # iris

# 'basic' để hai đầu viên thuốc là cạnh vuông, chỉ chèn khoảng trắng. 'rounded'
# thay chúng bằng nắp bo tròn vẽ bằng glyph powerline của Nerd Font — đã thử và
# bỏ, xem ghi chú ở khối separator bên dưới.
set -g @catppuccin_window_status_style 'basic' # basic, rounded, slanted, none

# Nền thanh trạng thái trong suốt. Mặc định plugin tô nền mantle (#292c3c), khác
# màu nền vùng nội dung phía trên nên chỗ giáp ranh hiện ra như một đường kẻ chạy
# suốt chiều rộng. 'none' cho thanh kế thừa nền terminal nên ranh giới biến mất.
# Dùng option của plugin thay vì tự set status-style: nó đặt luôn @_ctp_status_bg
# thành none, nhờ đó nắp bo tròn hai đầu viên thuốc cũng trong suốt theo — tự set
# status-style sẽ để lại hai mẩu #292c3c thừa ở mỗi đầu.
set -g @catppuccin_status_background 'none'

# Hiện TÊN CỬA SỔ (#W) thay vì tiêu đề pane (#T - mặc định của plugin).
# #W là cái mà automatic-rename tự cập nhật theo lệnh đang chạy (zsh, nvim...),
# còn #T do chương trình tự đặt qua escape sequence nên hay ra tiêu đề dài.
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Ba biến nắp bo tròn của window ĐANG CHỌN được plugin đặt bằng set -o, tức là
# chỉ ghi khi biến chưa tồn tại. Nếu đổi @catppuccin_window_status_style rồi
# source lại config trên server tmux đang chạy, chúng vẫn giữ giá trị của kiểu
# cũ: các window khác đã có nắp bo tròn còn window đang chọn thì vuông. Xoá đi
# để plugin dựng lại theo kiểu mới ngay cả khi không khởi động lại tmux.
set -ug @catppuccin_window_current_left_separator
set -ug @catppuccin_window_current_middle_separator
set -ug @catppuccin_window_current_right_separator

# Kéo giãn tương phản giữa window đang mở và các window còn lại: số của window
# không active tụt từ overlay_2 xuống overlay_0 (xám chìm hẳn), còn window active
# lấy rose #ebbcba — đúng màu viền pane active bên dưới, để "rose = đang hoạt
# động" là một quy ước duy nhất chạy suốt cả thanh lẫn khung. Trước đây hai bên
# gần bằng nhau nên phải nhìn kỹ mới thấy mình đang ở đâu.
set -g @catppuccin_window_number_color "#{@thm_overlay_0}"
set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_current_number_color "#ebbcba"
set -g @catppuccin_window_current_text_color "#{@thm_surface_1}"

# Bật icon trạng thái trong viên thuốc: quan trọng nhất là 󰊓 báo pane đang ZOOM —
# không có nó thì lúc lỡ zoom sẽ tưởng các pane kia biến mất. Các cờ ít dùng
# (current/last/mark/silent) đặt rỗng cho thanh khỏi rối.
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_flags_icon_zoom ' 󰊓'
set -g @catppuccin_window_flags_icon_activity ' 󰃭'
set -g @catppuccin_window_flags_icon_bell ' 󰂞'
set -g @catppuccin_window_flags_icon_current ''
set -g @catppuccin_window_flags_icon_last ''
set -g @catppuccin_window_flags_icon_mark ''
set -g @catppuccin_window_flags_icon_silent ''

# Icon session đổi theo trạng thái prefix: bình thường là , vừa bấm Ctrl+a thì
# thành 󰌌. Kèm với chip đổi sang đỏ, liếc một cái là biết tmux đang chờ phím
# tiếp theo. Viết #{?...} chứ không set -F: phải giữ nguyên chuỗi format để nó
# được tính lại mỗi lần vẽ thanh.
set -g @catppuccin_session_icon "#{?client_prefix, 󰌌 ,  }"

# Căn giữa icon trong chip màu. Mặc định plugin đặt icon là "<glyph><space>",
# tức là glyph dính sát mép trái còn khoảng trắng dồn hết sang phải. Thêm một
# khoảng trắng phía trước thành "<space><glyph><space>" là glyph nằm chính giữa.
# Viên thuốc quote ở cuối cũng dựng theo đúng quy ước này.

# ── Bảng màu: gradient Rosé Pine ───────────────────────────────
# tmux không vẽ được gradient liên tục (viền pane rộng đúng một ô và chỉ nhận
# MỘT màu đặc), nhưng thanh trạng thái là text nên rải được thành BẬC THANG.
# Bốn bậc nội suy tuyến tính giữa hai màu hồng của Rosé Pine, quét trái sang phải:
#     rose #ebbcba  →  #eba2ad  →  #eb899f  →  love #eb6f92
#      session          user        host        đồng hồ
#
# rose (#ebbcba) sáng hơn love (#eb6f92) nên nó mới là màu đánh dấu "đang hoạt
# động" — trên nền tối #191724, màu sáng nổi hơn màu bão hoà. Session, window
# đang chọn và viền pane active đều dùng rose.
#
# Chỉ chip icon (3 ô) mang màu này, nền chữ vẫn là xám Rosé Pine.
set -g @catppuccin_session_color "#{?client_prefix,#{E:@thm_red},#ebbcba}"

# Nền chữ của session lấy surface_1, sáng hơn surface_0 một bậc — đúng bằng
# window đang chọn. Nhờ đó hai viên thuốc "đang hoạt động" dựng y hệt nhau, còn
# ba viên bên phải dựng y hệt window nền.
set -g @catppuccin_status_session_text_bg "#{@thm_surface_1}"

# Bốn biến *_icon_bg dưới đây plugin chỉ ghi khi chúng còn rỗng (bọc trong %if).
# Nạp một lần là màu cũ nằm lại vĩnh viễn, source lại bao nhiêu lần cũng vẫn ra
# màu Catppuccin cũ. Xoá đi để plugin tính lại theo *_color ở trên.
set -ug @catppuccin_status_session_icon_bg

# Viền pane. Dùng option của plugin (thay vì tự set pane-border-style sau khi
# nạp) vì chuỗi có #{?...} cần giữ nguyên tới lúc vẽ — ## là cách escape để dấu
# # sống sót qua lần expand đầu tiên của plugin.
#   • không active : #403d52 — highlight_med, chìm gần như vô hình
#   • đang active  : #ebbcba — rose, khớp chip session và window đang chọn
#   • đang copy-mode: #f6c177 — gold, báo ngay là gõ phím sẽ không vào shell
#   • đang sync    : love #eb6f92 qua @thm_red — lưu ý Rosé Pine không có màu
#     đỏ riêng, love là màu đỏ nhất nó có, nên cảnh báo này nhạt hơn hẳn so
#     với đỏ #f38ba8 của Catppuccin. Đổi sang gold nếu muốn chói hơn.
set -g @catppuccin_pane_border_style "fg=#403d52"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#f6c177,##{?pane_synchronized,fg=#{@thm_red},fg=#ebbcba}}"

# Viên thuốc ở hai đầu thanh (session, user, host, giờ) để cạnh vuông cho khớp
# với window. Đây là mặc định của plugin, ghi lại tường minh vì ba biến này
# từng bị đổi sang nắp bo tròn nên có thể còn giá trị cũ nằm lại trên server.
#
# connect_separator 'yes' cho các viên thuốc dính liền nhau, không chèn
# #[bg=default] ở mỗi mối nối. Chỉ khi dùng nắp bo tròn mới cần 'no', vì nắp
# phải được vẽ bằng chữ màu surface_0 nên phải trả nền về trong suốt trước.
set -g @catppuccin_status_connect_separator 'yes'
set -g @catppuccin_status_left_separator ''
set -g @catppuccin_status_right_separator ' '

# Thanh vẽ lại mỗi 5 giây. Đây cũng là nhịp #() gọi lại lệnh shell đọc file
# quote, nên sửa file bằng editor thì chậm nhất 5 giây là thanh cập nhật theo.
set -g status-interval 5

# ╭──────────────────────────────────────────────────────────────╮
# │ 4. NẠP TPM                                                   │
# ╰──────────────────────────────────────────────────────────────╯

if-shell '[ -d ~/.tmux/plugins/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm' 'display-message "TPM not installed: run ./setup.sh"'

# ╭──────────────────────────────────────────────────────────────╮
# │ 5. THANH TRẠNG THÁI                                          │
# ╰──────────────────────────────────────────────────────────────╯
# Phải đặt SAU dòng nạp TPM: biến màu #{@thm_*} và các module
# #{E:@catppuccin_status_*} chỉ tồn tại sau khi plugin được nạp.

# Thanh nằm dưới cùng màn hình. Đây vốn là mặc định của tmux, ghi tường minh
# để khỏi phụ thuộc vào mặc định có thể đổi theo phiên bản.
set -g status-position bottom

# 'centre' căn danh sách window vào khoảng TRỐNG GIỮA status-left (session) và
# status-right (quote), nên dù mở bao nhiêu window nó cũng chỉ giãn trong khoảng
# đó rồi tự xén bớt — KHÔNG bao giờ tràn đè lên viên thuốc quote hay chip session.
#
# Trước đây dùng 'absolute-centre' (căn vào giữa TUYỆT ĐỐI của cả thanh): đẹp khi
# ít window vì list nằm đúng chính giữa, nhưng nó CỐ TÌNH bỏ qua status-left/right
# nên mở nhiều window là list phình ra hai phía rồi ghi đè lên quote. Các nhánh co
# quote theo client_width bên dưới chỉ tính bề RỘNG màn hình, không tính SỐ window,
# nên 3 window thì vừa mà 5–6 window là vỡ — đó chính là lỗi "chèn sang quote".
#
# Giá phải trả của 'centre': vì session (trái) và quote (phải) rộng không bằng
# nhau, tâm của list lệch khỏi chính giữa màn hình một quãng ≈ (rộng_phải −
# rộng_trái)/2 — rõ nhất khi quote dài đang hiện. Đổi lại là hết chồng lấn.
set -g status-justify centre

set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#{E:@catppuccin_status_session}"

# ── Viên thuốc quote của ngày ──────────────────────────────────
# Dựng tay theo đúng khuôn module của Catppuccin: chip icon màu nhấn, rồi chữ
# trên nền surface_0, rồi một khoảng trắng đóng viên thuốc.
#
# Chip lấy love #eb6f92 — đầu KIA của gradient so với session (rose #ebbcba),
# nên hai đầu thanh vẫn là hai cực của dải màu như trước.
#
# ##( chứ không #( : set -gF expand chuỗi này NGAY tại đây, ## là escape để dấu
# # sống sót qua lần expand đó. Viết #( thì lệnh shell chạy đúng một lần lúc nạp
# config rồi kết quả bị nướng cứng vào option, sửa quote sau đó thanh không đổi.
#
# head -1 vì file nhiều dòng sẽ phá vỡ thanh; cut -c1-60 chặn quote quá dài đẩy
# dãy window lệch khỏi giữa.
set -gF @quote_pill_55 "#[fg=#{@thm_crust},bg=#eb6f92]  #[fg=#{@thm_fg},bg=#{@thm_surface_0}] ##(head -1 ~/.config/tmux-quote.txt 2>/dev/null | cut -c1-55) #[fg=#{@thm_surface_0}] "
set -gF @quote_pill_28 "#[fg=#{@thm_crust},bg=#eb6f92]  #[fg=#{@thm_fg},bg=#{@thm_surface_0}] ##(head -1 ~/.config/tmux-quote.txt 2>/dev/null | cut -c1-28) #[fg=#{@thm_surface_0}] "

# Độ dài quote phải co theo bề rộng, không chỉ ẩn/hiện. Hình học của thanh:
# status-justify là absolute-centre nên dãy window bị ghim vào đúng giữa, phần
# bên phải chỉ còn khoảng W/2 trừ đi nửa dãy window. Đo ra được:
#     chỗ trống bên phải ≈ W/2 − 16    (với 3 window)
#     viên thuốc quote   ≈ số ký tự + 7
# tức là quote chỉ vừa khi  số ký tự ≤ W/2 − 23.
#   W=189 → 71 ký tự    W=130 → 42 ký tự    W=120 → 37 ký tự
# Bản trước cắt cứng 60 ký tự nên ở 130 cột vẫn thừa, tmux xén tiếp TỪ MÉP TRÁI
# và ra câu cụt đầu ("...ỉnh cao của tinh vi"). Nên chia hai bậc, lấy số thấp
# hơn mức tối đa một quãng để còn chỗ cho session dài hoặc thêm window.
#   >= 170 cột : 55 ký tự
#   120–169 cột: 28 ký tự
#   < 120 cột  : ẩn hẳn
# Hai nhánh cộng dồn bằng set -ag chứ không lồng #{?...} vào nhau: nhánh trong
# sẽ chứa dấu phẩy và phá cú pháp #{?điều-kiện,đúng,sai} của nhánh ngoài.
set -g  status-right "#{?#{e|>=:#{client_width},170},#{E:@quote_pill_55},}"
set -ag status-right "#{?#{&&:#{e|>=:#{client_width},120},#{e|<:#{client_width},170}},#{E:@quote_pill_28},}"

# ╭──────────────────────────────────────────────────────────────╮
# │ 6. TINH CHỈNH GIAO DIỆN (phải đặt SAU khi nạp theme)         │
# ╰──────────────────────────────────────────────────────────────╯
# Những option dưới đây plugin cũng có đặt, nên phải ghi đè sau khi nó chạy.
# Dùng set -gF để #{@thm_*} được thay bằng mã màu ngay tại đây.

# ── Viền pane ──
# 'heavy' vẽ viền bằng nét đậm ━┃ thay cho nét mảnh mặc định. Kết hợp với viền
# không-active màu chìm, khung đang gõ nổi hẳn lên thay vì phải dò tìm.
# Đổi thành 'single' nếu thích nét mảnh, 'double' nếu thích nét đôi.
set -g pane-border-lines heavy

# ── Thông báo và dòng lệnh (prefix + :) ──
# Mặc định của tmux là chữ đen trên nền vàng chói. Đổi thành thanh màu đặc,
# căn giữa cho gọn. Hai trạng thái lấy hai ĐẦU của gradient để tách bạch:
# thông báo là love #eb6f92, còn dòng lệnh ":" đang chờ gõ là rose #ebbcba —
# cùng quy ước "rose = đang hoạt động" với viền pane và window.
set -gF message-style "fg=#{@thm_crust},bg=#eb6f92,bold,align=centre"
set -gF message-command-style "fg=#{@thm_crust},bg=#ebbcba,bold,align=centre"

# ── Copy mode ──
# Vùng bôi đen dùng nền vàng; kết quả tìm kiếm nền xanh, riêng kết quả đang đứng
# thì nền cam để phân biệt với các kết quả còn lại khi bấm n/N.
set -gF mode-style "fg=#{@thm_crust},bg=#{@thm_yellow},bold"
setw -gF copy-mode-match-style "fg=#{@thm_crust},bg=#{@thm_sky}"
setw -gF copy-mode-current-match-style "fg=#{@thm_crust},bg=#{@thm_peach},bold"
setw -gF copy-mode-mark-style "fg=#{@thm_crust},bg=#{@thm_pink}"

# ── Popup và menu (tmux >= 3.4) ──
# Viền nét mảnh góc vuông + màu theo theme, để popup trông liền mạch với thanh
# trạng thái thay vì là một hộp ASCII trắng đen.
# 'single' = ┌─┐ góc vuông. Các lựa chọn khác: rounded (bo góc), double, heavy,
# simple, padded, none.
set -g popup-border-lines single
set -gF popup-style "bg=#{@thm_mantle},fg=#{@thm_fg}"
set -gF popup-border-style "fg=#ebbcba"

set -g menu-border-lines single
set -gF menu-style "fg=#{@thm_fg},bg=#{@thm_mantle}"
set -gF menu-selected-style "fg=#{@thm_crust},bg=#ebbcba,bold"
set -gF menu-border-style "fg=#ebbcba"

# ── Số hiệu pane (prefix + q) và đồng hồ (prefix + t) ──
# Pane đang chọn và kim đồng hồ cũng dùng rose cho khớp phần còn lại.
set -gF display-panes-colour "#{@thm_overlay_1}"
set -gF display-panes-active-colour "#ebbcba"
set -g display-panes-time 1500
set -g display-time 2000
setw -gF clock-mode-colour "#ebbcba"
setw -g clock-mode-style 24

# ── Báo hiệu hoạt động ──
# monitor-activity để 'off': bật lên thì MỌI window nền in ra bất cứ thứ gì cũng
# dính icon, kể cả cái prompt zsh vẽ ra lúc mới tạo — thử rồi, ba window mở lên
# là ba icon 󰃭 sáng ngay, và chúng chỉ tắt khi ghé qua từng window. Icon lúc nào
# cũng sáng thì không còn là tín hiệu nữa. Đổi thành 'on' nếu hay chạy lệnh dài
# ở window nền và muốn biết lúc nó in ra dòng đầu tiên.
setw -g monitor-activity off

# Chuông thì hiếm và luôn có nghĩa nên vẫn theo dõi, chỉ đổi cách báo: bỏ dòng
# chữ che ngang màn hình, để icon 󰂞 trong viên thuốc nói thay.
setw -g monitor-bell on
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

# Plugin đặt window-status-activity-style thành nền lavender đặc, tô đè cả viên
# thuốc nên window có hoạt động trông như đang được chọn. Trả về 'default' để
# viên thuốc giữ màu của nó, chỉ icon báo hiệu là đủ.
set -g window-status-activity-style default
set -g window-status-bell-style default

# ╭──────────────────────────────────────────────────────────────╮
# │ 7. POPUP TIỆN TAY                                            │
# ╰──────────────────────────────────────────────────────────────╯
# Popup nổi lên trên nội dung hiện tại rồi biến mất, không phá layout khung
# đang chia. -N là mô tả, hiện ra trong bảng phím prefix + ?

# Shell tạm ngay tại thư mục của pane hiện tại.
bind -N "Shell tạm trong popup" C-g display-popup -E -w 80% -h 75% -d "#{pane_current_path}"

# Nhảy session bằng fzf. Nhanh hơn prefix + s khi có nhiều session.
if-shell 'command -v fzf > /dev/null' {
    bind -N "Chuyển session (fzf)" C-s display-popup -E -w 50% -h 50% \
        "tmux list-sessions -F '#{session_name}' | fzf --reverse --border=none --prompt='session ❯ ' | xargs -r tmux switch-client -t"
}

# Xem tài nguyên máy mà không phải mở thêm khung.
if-shell 'command -v btop > /dev/null' {
    bind -N "btop trong popup" C-b display-popup -E -w 90% -h 90% "btop"
}

# ╭──────────────────────────────────────────────────────────────╮
# │ 8. QUOTE CỦA NGÀY                                            │
# ╰──────────────────────────────────────────────────────────────╯
# prefix + Q mở dòng nhập, gõ xong Enter là thanh đổi ngay.
#
# Vì sao đi vòng qua option @quote rồi mới ghi file, thay vì
#     run-shell "echo %% > ~/.config/tmux-quote.txt"
# cho gọn: %% là chữ bạn vừa gõ, nhét thẳng vào chuỗi shell thì mọi dấu nháy,
# $, ` trong câu quote đều bị shell diễn giải — gõ một câu có dấu ' là lệnh vỡ.
# Ở đây %% chỉ đi vào tmux (set -g @quote), còn run-shell hỏi ngược lại tmux qua
# `tmux show -gv`, nên chữ của bạn không bao giờ đi qua bộ phân tích của shell.
#
# -I nạp sẵn quote hiện tại vào dòng nhập để sửa tiếp thay vì gõ lại từ đầu.
bind -N "Nhập quote của ngày" Q command-prompt \
    -p "quote:" \
    -I "#(head -1 ~/.config/tmux-quote.txt 2>/dev/null)" \
    { set -g @quote "%%" ; run-shell "tmux show -gv @quote > ~/.config/tmux-quote.txt" }

# prefix + Alt-Q xoá quote cho thanh gọn lại.
bind -N "Xoá quote của ngày" M-q run-shell "rm -f ~/.config/tmux-quote.txt"

# Lazygit. Bọc trong if-shell vì file config này dùng chung với máy Linux —
# máy nào chưa cài lazygit thì rơi xuống nhánh git log --graph, vẫn có cây
# commit để xem chứ không mất trắng phím g.
#
# Nhánh dự phòng: --color=always là bắt buộc vì output bị pipe, không có nó git
# tắt màu và cây ra trắng đen. less -R để cuộn được, q để thoát.
if-shell 'command -v lazygit > /dev/null' {
    bind -N "Lazygit trong popup" g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
        "git rev-parse --is-inside-work-tree >/dev/null 2>&1 \
         && lazygit \
         || tmux display-message 'thu muc nay khong phai git repo'"
} {
    bind -N "Git graph trong popup" g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
        "git rev-parse --is-inside-work-tree >/dev/null 2>&1 \
         && git log --graph --all --decorate --color=always \
                --format='%C(auto)%h%d %C(reset)%s %C(dim white)(%cr - %an)' | less -R \
         || tmux display-message 'thu muc nay khong phai git repo'"
}

# Lazydocker. Chặn trước bằng `docker info` chứ không gọi thẳng: máy này chạy
# docker qua colima, mà colima không tự khởi động cùng máy. Không chặn thì popup
# mở ra, lazydocker loay hoay tìm daemon rồi văng một trang lỗi khó đọc. Chặn
# rồi thì báo đúng một dòng kèm lệnh cần chạy.
if-shell 'command -v lazydocker > /dev/null' {
    bind -N "Lazydocker trong popup" C-d display-popup -E -w 90% -h 90% \
        "docker info >/dev/null 2>&1 \
         && lazydocker \
         || tmux display-message 'docker daemon chua chay - thu: colima start'"
}
