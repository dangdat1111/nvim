# Đổi phím Prefix từ Ctrl+b sang Ctrl+a (giống Primeagen hay dùng)
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Chia màn hình bằng | và -
unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

# Làm mới cấu hình tmux bằng 'r'
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Đánh số window/pane từ 1 cho dễ bấm
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Giảm delay khi chuyển mode hoặc dùng phím Esc trong Neovim
set -sg escape-time 10

# Di chuyển giữa các khung (panes) bằng phím nvim (h,j,k,l)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
# Cho phép dùng chuột
set -g mouse on

# Vi mode trong copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Clipboard: file này dùng chung cho máy Mac lẫn máy Linux, mà hai bên copy bằng
# lệnh khác nhau (pbcopy vs xclip). if-shell chạy lúc nạp config nên mỗi máy chỉ
# bind đúng lệnh nó có; hardcode một bên sẽ làm bên kia copy ra rỗng.
if-shell 'command -v pbcopy > /dev/null' {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -sel clip"
}

# Danh sách plugin
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator' # Di chuyển mượt giữa nvim và tmux
set -g @plugin 'catppuccin/tmux#v2.3.0' # Giao diện màu sắc
# Hỗ trợ hiển thị màu sắc 256 và icon chuẩn
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -ga terminal-overrides ",*:Tc"

# ── Catppuccin: flavor và kiểu cửa sổ (đặt TRƯỚC khi nạp plugin) ──
set -g @catppuccin_flavor 'frappe' # latte, frappe, macchiato, mocha
set -g @catppuccin_window_status_style 'rounded' # basic, rounded, slanted, none

# Hiện TÊN CỬA SỔ (#W) thay vì tiêu đề pane (#T - mặc định của plugin).
# #W là cái mà automatic-rename tự cập nhật theo lệnh đang chạy (zsh, nvim...),
# còn #T do chương trình tự đặt qua escape sequence nên hay ra tiêu đề dài.
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Khởi tạo TPM (luôn để ở cuối file)
if-shell '[ -d ~/.tmux/plugins/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm' 'display-message "TPM not installed: run ./setup.sh"'

# ── Thanh trạng thái: dùng module có sẵn của Catppuccin ─────────
# Phải đặt SAU dòng nạp TPM: biến màu #{@thm_*} và các module
# #{E:@catppuccin_status_*} chỉ tồn tại sau khi plugin được nạp.
set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#{E:@catppuccin_status_session}"

set -g status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_host}"
